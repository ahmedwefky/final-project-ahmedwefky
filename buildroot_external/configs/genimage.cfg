# A/B Update Partition Layout Configuration for Raspberry Pi 4
# This configuration defines the SD card layout for dual-partition OTA updates
#
# Partitions:
#   p1: Boot partition (FAT32) - U-Boot, kernel, device tree, boot files
#   p2: Root filesystem A (ext4) - Active rootfs (default, bootpart=2)
#   p3: Root filesystem B (ext4) - Inactive rootfs (update target, bootpart=3)

image boot.vfat {
	vfat {
		files = {
			"bcm2711-rpi-400.dtb",
			"bcm2711-rpi-4-b.dtb",
			"bcm2711-rpi-cm4.dtb",
			"bcm2711-rpi-cm4s.dtb",
			"cmdline.txt",
			"config.txt",
			"rpi-firmware/overlays",
			"boot.scr",
			"Image",
		}
		file start4.elf {
			image = "rpi-firmware/start4.elf"
		}
		file fixup4.dat {
			image = "rpi-firmware/fixup4.dat"
		}
		file kernel8.img {
			image = "u-boot.bin"
		}
	}
  	size = 256M
}

image sdcard.img {
	hdimage {
		# MBR partition table (not GPT) for maximum compatibility with U-Boot/RPi
		partition-table-type = "dos"
	}

	# Partition 1: Boot (FAT32)
	# Contains U-Boot, kernel, device tree, and boot scripts
	# Shared between both A/B rootfs partitions
	partition boot {
		partition-type = 0xC
		bootable = "true"
		image = "boot.vfat"
    	size = 256M
	}

	# Partition 2: Rootfs A (ext4) - Default Active
	# Primary root filesystem
	# Size: Adjust based on your rootfs requirements
	# This is the partition that boots by default
	partition rootfsA {
		partition-type = 0x83
		image = "rootfs.ext4"
		size = 1G
	}

	# Partition 3: Rootfs B (ext4) - Inactive (Update Target)
	# Secondary root filesystem for A/B updates
	# Same size as rootfsA for consistency
	# This is the target partition for OTA updates
	partition rootfsB {
		partition-type = 0x83
		image = "rootfs.ext4"
		size = 1G
	}

  # In an A/B system, /etc, /var, or user files on rootfsA will disappear after switching to rootfsB. 
  # It is standard practice to create a third Data Partition that is mounted at /data in both A and B 
  # rootfsystems to store persistent information (like logs, database, or SSH keys).
  partition data {
    partition-type = 0x83
    size = 1G
  }  
}